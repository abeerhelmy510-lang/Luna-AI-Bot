<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لونا: رفيقتي الذكية</title>
    <style>
        body { 
            margin: 0; padding: 0; 
            background: linear-gradient(135deg, #fce7f3 0%, #fbcfe8 100%);
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* شاشة طلب الاسم (تظهر في البداية فقط) */
        #nameOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            z-index: 100; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }

        .name-box {
            text-align: center; padding: 30px; background: white;
            border-radius: 25px; border: 3px solid #f472b6;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* حاوية الشخصية */
        .luna-container {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; position: relative;
        }

        .luna-image {
            width: 320px; transition: 0.5s;
            filter: drop-shadow(0 15px 30px rgba(244, 114, 182, 0.4));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .chat-bubble {
            background: white; border: 2px solid #f472b6;
            border-radius: 25px; padding: 20px;
            max-width: 80%; min-width: 240px;
            text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            margin-bottom: 20px; font-size: 1.1em; color: #1e293b;
        }

        .input-bar {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px); padding: 20px;
            display: flex; gap: 10px; border-top: 1px solid #f9a8d4;
        }

        input {
            flex: 1; padding: 15px; border-radius: 20px;
            border: 2px solid #fbcfe8; outline: none;
        }

        button {
            background: #f472b6; color: white; border: none;
            padding: 0 25px; border-radius: 20px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="nameOverlay">
        <div class="name-box">
            <h2 style="color: #f472b6;">أهلاً بكِ في عالم لونا ✨</h2>
            <p>ممكن تقولي لي اسمك إيه؟</p>
            <input type="text" id="userNameInput" placeholder="اكتبي اسمك هنا..." style="margin-bottom: 15px; width: 200px;">
            <br>
            <button onclick="saveName()" style="padding: 10px 30px;">ابدئي الكلام</button>
        </div>
    </div>

    <div class="luna-container">
        <div class="chat-bubble" id="lunaResponse">
            أنا مستنية أعرف اسمك عشان نبدأ يومنا سوا! 😊
        </div>
        <img src="https://i.ibb.co/vYm6p6p/cute-anime-robot.png" class="luna-image" id="lunaImg" alt="Luna">
    </div>

    <div class="input-bar">
        <input type="text" id="userInput" placeholder="احكي لـ لونا أي حاجة..." onkeypress="if(event.key==='Enter') chatWithLuna()">
        <button onclick="chatWithLuna()">إرسال</button>
    </div>

<script>
    let userName = "";

    function saveName() {
        const nameIn = document.getElementById('userNameInput').value.trim();
        if (nameIn) {
            userName = nameIn;
            document.getElementById('nameOverlay').style.display = 'none';
            document.getElementById('lunaResponse').innerHTML = `أهلاً يا ${userName}! نورتي عالمي الصغير.. أنا فرحانة جداً إننا سوا النهاردة 💖`;
        } else {
            alert("من فضلك اكتبي اسمك أولاً عشان لونا تتعرف عليكي!");
        }
    }

    const personality = {
        "أزيك": ["أنا تمام جداً يا {name}، وإنتي عاملة إيه؟ ✨", "بخير طول ما إنتي معايا يا {name}!"],
        "زهقان": ["يا روحي يا {name}، تعالي نلعب أو أحكي لك نكتة! 🎨", "أنا جنبك يا {name}، إيه رأيك نفكر في مشروع برمجة جديد؟"],
        "أحبك": ["وأنا كمان بحبك أوي يا {name}! 🥰", "يا {name}، إنتي أغلى صديقة عندي!"],
        "شكرا": ["العفو يا حبيبة لونا! 🎀"],
        "نكتة": ["مرة مبرمج تاه في الصحراء، قعد يتدور على 'Signal'! 😂", "ليه الكمبيوتر بيخاف من البحر؟ عشان الـ 'Waves'! هههه"],
        "تعبان": ["سلامتك ألف سلامة يا {name}.. خدي راحة وأنا هستناكي هنا 💤"]
    };

    function chatWithLuna() {
        const input = document.getElementById('userInput');
        const bubble = document.getElementById('lunaResponse');
        const val = input.value.trim();

        if(!val) return;

        bubble.innerHTML = "...";

        setTimeout(() => {
            let found = false;
            for(let key in personality) {
                if(val.includes(key)) {
                    let choices = personality[key];
                    let response = choices[Math.floor(Math.random() * choices.length)];
                    bubble.innerHTML = response.replace("{name}", userName);
                    found = true;
                    break;
                }
            }

            if(!found) {
                const generic = [
                    `كلامك جميل يا ${userName}، كملي أنا سامعاكي.. 😊`,
                    `إنتي بجد شاطرة يا ${userName}، احكي لي أكتر.. ✨`,
                    `مممم، أنا معاكي يا ${userName}.. كملي 🥰`
                ];
                bubble.innerHTML = generic[Math.floor(Math.random() * generic.length)];
            }
        }, 600);

        input.value = "";
    }
</script>

</body>
</html>
