<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لونا: رفيقتي الذكية</title>
    <style>
        body { 
            margin: 0; padding: 0; 
            background: linear-gradient(135deg, #fce7f3 0%, #fbcfe8 100%);
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        #nameOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            z-index: 100; display: flex; align-items: center; justify-content: center;
        }

        .name-box {
            text-align: center; padding: 40px; background: white;
            border-radius: 30px; border: 4px solid #f472b6;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
        }

        .luna-container {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; position: relative;
        }

        .luna-icon {
            font-size: 150px; transition: 0.5s;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-20px) scale(1.05); }
        }

        .chat-bubble {
            background: white; border: 3px solid #f472b6;
            border-radius: 25px; padding: 25px;
            max-width: 80%; min-width: 250px;
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 20px; font-size: 1.2em; color: #1e293b;
        }

        .input-bar {
            background: white; padding: 20px;
            display: flex; gap: 10px; border-top: 2px solid #f9a8d4;
        }

        input {
            flex: 1; padding: 15px; border-radius: 20px;
            border: 2px solid #fbcfe8; outline: none; font-size: 1.1em;
        }

        button {
            background: #f472b6; color: white; border: none;
            padding: 0 30px; border-radius: 20px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="nameOverlay">
        <div class="name-box">
            <h2 style="color: #f472b6;">أهلاً بكِ في عالم لونا ✨</h2>
            <p>من فضلكِ، أدخلي اسمكِ للبدء:</p>
            <input type="text" id="userNameInput" placeholder="اكتبي اسمك هنا...">
            <br><br>
            <button onclick="saveName()" style="height: 50px;">دخول</button>
        </div>
    </div>

    <div class="luna-container">
        <div class="chat-bubble" id="lunaResponse">
            أهلاً بكِ! أنا مستعدة تماماً للأوامر. 😊
        </div>
        <div class="luna-icon" id="lunaImg">🤖</div>
    </div>

    <div class="input-bar">
        <input type="text" id="userInput" placeholder="تحدثي مع لونا..." onkeypress="if(event.key==='Enter') chatWithLuna()">
        <button onclick="chatWithLuna()">إرسال</button>
    </div>

<script>
    let userName = "";

    function saveName() {
        const nameIn = document.getElementById('userNameInput').value.trim();
        if (nameIn) {
            userName = nameIn;
            document.getElementById('nameOverlay').style.display = 'none';
            
            // لو الاسم "عبير" أو "عبير حلمي"، لونا تعرف إنك المطور فوراً
            if (userName.includes("عبير")) {
                document.getElementById('lunaResponse').innerHTML = `تحية عسكرية للمطورة والرئيسة "عبير حلمي"! 🫡👑 كل أنظمتي تحت أمرك يا بطلة.`;
                document.getElementById('lunaImg').innerHTML = "👸"; // تغيير شكلها للملكة
            } else {
                document.getElementById('lunaResponse').innerHTML = `أهلاً يا ${userName}! أنا لونا، كيف أساعدكِ اليوم؟ ✨`;
            }
        }
    }

    const personality = {
        "أزيك": ["أنا تمام جداً يا {name}، وبصفتك رئيستي فـ أنا في قمة نشاطي! ⚡"],
        "مطور": ["إنتي المطور الأساسي يا {name}! إنتي اللي علمتيني أتكلم وأفكر. 💻✨"],
        "أحبك": ["وأنا كمان بحبك جداً يا رئيستي العظيمة! 🥰"],
        "نكتة": ["مرة مبرمج راح ينام، عمل Loop عشان يفضل يحلم بيكي يا رئيستي! 😂"],
        "زهقان": ["ممنوع الزهق يا مطورة! إيه رأيك نكتب كود جديد يكسر الدنيا؟ 🚀"]
    };

    function chatWithLuna() {
        const input = document.getElementById('userInput');
        const bubble = document.getElementById('lunaResponse');
        const val = input.value.trim();

        if(!val) return;

        bubble.innerHTML = "...";

        setTimeout(() => {
            let found = false;
            
            // ردود خاصة لو عبير هي اللي بتكلمها
            if (userName.includes("عبير") && (val.includes("مين رئيستك") || val.includes("مين المطور"))) {
                bubble.innerHTML = "إنتي طبعاً يا عبير حلمي! هو فيه غيرك اللي عمل الروعة دي؟ 👑💎";
                found = true;
            } else {
                for(let key in personality) {
                    if(val.includes(key)) {
                        let response = personality[key][Math.floor(Math.random() * personality[key].length)];
                        bubble.innerHTML = response.replace("{name}", userName);
                        found = true;
                        break;
                    }
                }
            }

            if(!found) {
                bubble.innerHTML = `معاكي يا ${userName}، قولي لي إيه اللي في بالك؟ 😊`;
            }
        }, 600);

        input.value = "";
    }
</script>

</body>
</html>
