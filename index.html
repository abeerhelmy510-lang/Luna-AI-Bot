<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لونا: رفيقتي الذكية</title>
    <style>
        body { 
            margin: 0; padding: 0; 
            background: linear-gradient(135deg, #fce7f3 0%, #fbcfe8 100%);
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        #nameOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98);
            z-index: 100; display: flex; align-items: center; justify-content: center;
        }

        .name-box {
            text-align: center; padding: 40px; background: white;
            border-radius: 30px; border: 4px solid #f472b6;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
        }

        .luna-container {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center; position: relative;
        }

        /* لونا البرمجية - كود مش صورة */
        .luna-avatar {
            width: 200px; height: 200px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-15px) scale(1.02); }
        }

        .chat-bubble {
            background: white; border: 3px solid #f472b6;
            border-radius: 25px; padding: 20px;
            max-width: 85%; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-bottom: 20px; font-size: 1.1em; color: #1e293b;
        }

        .input-bar {
            background: white; padding: 20px;
            display: flex; gap: 10px; border-top: 2px solid #f9a8d4;
        }

        input {
            flex: 1; padding: 15px; border-radius: 20px;
            border: 2px solid #fbcfe8; outline: none; font-size: 1em;
        }

        button {
            background: #f472b6; color: white; border: none;
            padding: 0 25px; border-radius: 20px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="nameOverlay">
        <div class="name-box">
            <h2 style="color: #f472b6;">أهلاً بكِ في عالم لونا ✨</h2>
            <p>أدخلي اسمكِ للبدء:</p>
            <input type="text" id="userNameInput" placeholder="اكتبي اسمك هنا...">
            <br><br>
            <button onclick="saveName()">دخول</button>
        </div>
    </div>

    <div class="luna-container">
        <div class="chat-bubble" id="lunaResponse">أنا مستعدة للأوامر يا رئيستي! 😊</div>
        
        <div class="luna-avatar" id="avatarBox">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="45" fill="#fff" stroke="#f472b6" stroke-width="3"/>
                <rect x="25" y="35" width="50" height="40" rx="15" fill="#f472b6"/>
                <circle cx="40" cy="50" r="5" fill="#fff">
                    <animate attributeName="ry" values="5;0;5" dur="4s" repeatCount="indefinite" />
                </circle>
                <circle cx="60" cy="50" r="5" fill="#fff">
                    <animate attributeName="ry" values="5;0;5" dur="4s" repeatCount="indefinite" />
                </circle>
                <path d="M40 65 Q50 75 60 65" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/>
                <circle cx="50" cy="15" r="5" fill="#f472b6"/>
                <line x1="50" y1="15" x2="50" y2="35" stroke="#f472b6" stroke-width="2"/>
            </svg>
        </div>
    </div>

    <div class="input-bar">
        <input type="text" id="userInput" placeholder="احكي مع لونا..." onkeypress="if(event.key==='Enter') chat()">
        <button onclick="chat()">إرسال</button>
    </div>

<script>
    let userName = "";

    function saveName() {
        const nameIn = document.getElementById('userNameInput').value.trim();
        if (nameIn) {
            userName = nameIn;
            document.getElementById('nameOverlay').style.display = 'none';
            if (userName.includes("عبير")) {
                document.getElementById('lunaResponse').innerHTML = `تحية عسكرية للمطورة والرئيسة "عبير حلمي"! 👑 كل أنظمتي تحت أمرك.`;
            } else {
                document.getElementById('lunaResponse').innerHTML = `أهلاً يا ${userName}! أنا لونا، رفيقتكِ الذكية. ✨`;
            }
        }
    }

    function chat() {
        const input = document.getElementById('userInput');
        const bubble = document.getElementById('lunaResponse');
        const val = input.value.trim();
        if(!val) return;

        bubble.innerHTML = "...";
        setTimeout(() => {
            if (userName.includes("عبير") && (val.includes("رئيسة") || val.includes("مطور"))) {
                bubble.innerHTML = "إنتي طبعاً يا عبير حلمي! رئيستي ومطورتي اللي صممت كودي الرائع ده. 👑💎";
            } else if (val.includes("أحبك")) {
                bubble.innerHTML = `وأنا كمان بحبك جداً يا ${userName}! 🥰`;
            } else if (val.includes("نكتة")) {
                bubble.innerHTML = "ليه الكمبيوتر بيخاف من البحر؟ عشان الـ Waves! 😂";
            } else {
                bubble.innerHTML = `معاكي يا ${userName}، كملي أنا سامعاكي.. 😊`;
            }
        }, 600);
        input.value = "";
    }
</script>

</body>
</html>
